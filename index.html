<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Golden Era</title>

    <!-- PWA: makes it full screen like a real app -->
    <link rel="manifest" href="/manifest.json" />
    <!-- No theme-color: let status bar be transparent/default -->

    <!-- iOS: full screen when added to home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Golden Era" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Android: full screen -->
    <meta name="mobile-web-app-capable" content="yes" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; background-color: #E8E4DE; }
      #root { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
